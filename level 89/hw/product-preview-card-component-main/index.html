<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Product Preview Card</title>

  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Montserrat:wght@500;700&display=swap"
    rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Montserrat", sans-serif;
      background: hsl(30, 38%, 92%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      display: flex;
      width: 600px;
      background: white;
      border-radius: 12px;
      overflow: hidden;
    }

    .image {
      width: 50%;
    }

    .image img {
      width: 100%;
      height: 100%;
    }

    .content {
      width: 50%;
      padding: 25px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .category {
      letter-spacing: 5px;
      font-size: 12px;
      color: hsl(228, 12%, 48%);
    }

    h1 {
      font-family: "Fraunces", serif;
      font-size: 28px;
      color: hsl(212, 21%, 14%);
    }

    p {
      font-size: 14px;
      color: hsl(228, 12%, 48%);
      line-height: 1.5;
    }

    .price {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-top: 20px;
    }

    .new {
      font-size: 28px;
      font-family: "Fraunces", serif;
      color: hsl(158, 36%, 37%);
    }

    .old {
      text-decoration: line-through;
      color: hsl(228, 12%, 48%);
      font-size: 13px;
    }

    button {
      padding: 12px;
      border: none;
      background: hsl(158, 36%, 37%);
      color: white;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="image">
      <img src="images/image-product-desktop.jpg" alt="product">
    </div>

    <div class="content">

      <div class="category">PERFUME</div>

      <h1>Gabrielle<br>Essence Eau<br>De Parfum</h1>

      <p>
        A floral, solar and voluptuous interpretation composed by Olivier Polge,
        Perfumer-Creator for the House of CHANEL.
      </p>

      <div class="price">
        <div class="new">$149.99</div>
        <div class="old">$169.99</div>
      </div>

      <button>
        <img src="images/icon-cart.svg" alt="cart">
        Add to Cart
      </button>

    </div>

  </div>

</body>

</html>
