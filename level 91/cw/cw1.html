<!-- შექმენთ 4 დივი.მიეცით ზომები 4 ისვე 200PX 200PX და ოთხივეს განსხვავებული ფერი,ამოირჩიეთ ერთ ერთი დივი და ეს დივი გაწიეთ მარჯვნივ 105 
პიქსელით და ჩამოწიეთ ზემოდან ქვემოთ 65პხ ით -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4 Div</title>

    <style>
        .box {
            width: 200px;
            height: 200px;
            margin: 10px;
        }

        .box1 {
            background-color: red;
        }

        .box2 {
            background-color: blue;
            position: relative;
            left: 105px;
            top: 65px;
        }

        .box3 {
            background-color: green;
        }

        .box4 {
            background-color: purple;
        }
    </style>
</head>

<body>

    <div class="box box1"></div>
    <div class="box box2"></div>
    <div class="box box3"></div>
    <div class="box box4"></div>

</body>

</html>
