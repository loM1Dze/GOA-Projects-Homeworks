<!-- 8) შექმენით ერთი პარაგრაფი, შემდეგ ერთი ღილაკი და შემდეგ ერთი h1 სათაური. ღილაკს გაუწერეთ padding კუთვნილება ზემოდან და ქვემოდან 60px, გვერდებიდან 40px, ასევე მიანიჭეთ ყველა მხარეს სხვა და სხვა ფერის საზღვრები. ასევე დააშორეთ ყველა თეგი ოთხივე მხრიდან 148px-ით margin კუთვნილების გამოყენებით. -->

<html>

<head>
    <style>
        p,
        button,
        h1 {
            margin: 148px;
        }

        button {
            padding: 60px 40px;
            border-top: 3px solid red;
            border-right: 3px solid green;
            border-bottom: 3px solid blue;
            border-left: 3px solid yellow;
        }
    </style>
</head>

<body>
    <p>opsec</p>
    <button>opsec</button>
    <h1>opsec</h1>
</body>

</html>
