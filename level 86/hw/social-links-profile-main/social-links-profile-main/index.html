<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Social links profile</title>

  <style>

    * {
      margin: 0;
      box-sizing: border-box;
      font-family: sans-serif;
    }

    body {
      background: hsl(0, 0%, 8%);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      width: 280px;
      background: hsl(0, 0%, 12%);
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .card img {
      width: 65px;
      border-radius: 50%;
      align-self: center;
    }

    h1 {
      color: white;
      font-size: 18px;
      font-weight: 500;
    }

    .location {
      color: hsl(75, 94%, 57%);
      margin-top: -10px;
      font-size: 10px;
      font-weight: 700;
    }

    .bio {
      color: #c3c3c3;
      font-size: 10px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 11px;
    }

    .links a {
      display: block;
      text-decoration: none;
      background: hsl(0, 0%, 20%);
      color: white;
      padding: 11px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: bold;
    }

    .links a:hover {
      background: hsl(75, 94%, 57%);
      color: black;
    }
  </style>
  </style>
</head>

<body>

  <div class="card">
    <img src="./assets/images/avatar-jessica.jpeg" alt="Jessica Randall">

    <h1>Jessica Randall</h1>

    <p class="location">London, United Kingdom</p>

    <p class="bio">"Front-end developer and avid reader."</p>

    <div class="links">
      <a href="#">GitHub</a>
      <a href="#">Frontend Mentor</a>
      <a href="#">LinkedIn</a>
      <a href="#">Twitter</a>
      <a href="#">Instagram</a>
    </div>
  </div>

</body>

</html>
