<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Flex მიმართულება</title>

    <style>
        .parent {
            width: 600px;
            height: 600px;
            border: 3px solid black;
            display: flex;
            flex-direction: column;
        }

        .child {
            width: 100px;
            height: 100px;
            background-color: violet;
            border: 3px solid yellow;
        }
    </style>

</head>

<body>

    <div class="parent">
        <div class="child"></div>
        <div class="child"></div>
        <div class="child"></div>
        <div class="child"></div>
    </div>

</body>

</html>
