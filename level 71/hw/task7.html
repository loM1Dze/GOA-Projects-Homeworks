<!-- font-weight არის CSS კუთვნილება, რომელიც განსაზღვრავს ტექსტის სისქეს (რამდენად მსუბუქი ან სქელია ტექსტი).

დანიშნულება:
ამ კუთვნილებით შეგვიძლია ტექსტი გავხადოთ უფრო თხელი ან უფრო სქელი.

font-weight-ის მნიშვნელობები შეიძლება იყოს:

სიტყვიერი მნიშვნელობები:
normal  - ჩვეულებრივი სისქე
bold    - სქელი ტექსტი
bolder  - bold ზე უფრო სქელი
lighter - normal ზე უფრო თხელი

რიცხვითი მნიშვნელობები:
100, 200, 300, 400, 500, 600, 700, 800, 900
სადაც 100 არის ყველაზე თხელი და 900 ყველაზე სქელი.

მაგალითები:

p {
    font-weight: bold;
}

h1 {
    font-weight: 700;
}

div {
    font-weight: lighter;
} -->
