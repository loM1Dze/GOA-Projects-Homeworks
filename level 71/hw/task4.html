<!-- 5) შექმენით ცხრილი - table თქვენს სასურველ თემაზე. ყოველი ცხრილის უჯრა გასტილეთ მხოლოდ მთლიანი table-ის გასტილვით. table-ს მიანიჭეთ შემდეგი სტილები - სისქე ანუ font-weight: 900, ფერი მწვანე (RGB), ზომა 24px. -->
