<!-- 
font-family არის CSS კუთვნილება, რომელიც განსაზღვრავს ტექსტის ტიპოგრაფიას (სისქის, სტილისა და ოჯახის ტიპს).

დანიშნულება:
გამოიყენება, რომ ტექსტი გამოჩნდეს უფრო ლამაზად და განსხვავებულად. 

font-family-ის მნიშვნელობები შეიძლება იყოს:

1. კონკრეტული ფონტების სახელები:
   მაგალითად: Arial, Times New Roman, Courier, Verdana

2. ზოგადი ოჯახები (generic families):
   - serif      (მაგ. Times New Roman) - ტრადიციული შრიფტი
   - sans-serif (მაგ. Arial) - თანამედროვე, უშრიფტო
   - monospace  (მაგ. Courier) - ყველა სიმბოლი ერთიდაიგივე სიგანით
   - cursive    - ხელნაწერი სტილის შრიფტები
   - fantasy    - დეკორატიული, ფანტასტიკური შრიფტები

მაგალითები:

p {
    font-family: Arial, sans-serif;
}

h1 {
    font-family: Times New Roman, serif;
}

div {
    font-family: monospace;
} -->
