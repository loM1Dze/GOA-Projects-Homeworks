<!-- 7) შექმენით 3 ცალი div თეგი, პირველში გქონდეთ მოთავსებული 5 პარაგრაფი, მეორეში 5 სათაური და მეხუთეში 5 ღილაკი. გამოიყენეთ ყველა ნასწავლი სტილები: ფერები, უკანა ფონის ფერი, საზღვრები, ზომა, სისქე, ტექსტის ცენტრში დაყენება, ჩრდილი, ტექსტის დეკორაციები და ტექსტის ტრანსფორმაცია, გაუწერეთ ნებისმიერი მნიშვნელობები მაგრამ აუცილებლად გამოიყენეთ აქედან ყველა სტილის კუთვნილებები. პირველი დივი გასტილეთ მშობელი ელემენტით, მეორე Style Inheritance-ით, ხოლო მესამე კი კლასებით. -->

<html>

<head>
    <title>Div Styling</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>


    <div id="parent">
        <p>Paragraph 1</p>
        <p>Paragraph 2</p>
        <p>Paragraph 3</p>
        <p>Paragraph 4</p>
        <p>Paragraph 5</p>
    </div>


    <div id="inherit">
        <h1>Heading 1</h1>
        <h2>Heading 2</h2>
        <h3>Heading 3</h3>
        <h4>Heading 4</h4>
        <h5>Heading 5</h5>
    </div>


    <div>
        <button class="btn">Button 1</button>
        <button class="btn">Button 2</button>
        <button class="btn">Button 3</button>
        <button class="btn">Button 4</button>
        <button class="btn">Button 5</button>
    </div>

</body>

</html>
