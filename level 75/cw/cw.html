<html>

<head>
    <meta charset="UTF-8">
    <title>ავტომობილების ცხრილი</title>
    <style>
        table {
            border-collapse: collapse;
            width: 80%;
            margin: 20px auto;
        }


        table,
        th,
        td {
            border: 2px solid black;
        }


        tr:nth-child(even) {
            color: yellow;
            background-color: blue;
            font-family: sans-serif;
            font-weight: bold;
            font-size: 35px;
            text-align: center;
        }


        tr:nth-child(odd) {
            color: green;
            background-color: red;
            font-family: cursive;
            text-align: center;
        }
    </style>
</head>

<body>

    <table>
        <tr>
            <th>ავტომობილის სახელი</th>
            <th>წელი</th>
            <th>ფერი</th>
        </tr>
        <tr>
            <td>BMW M5 F90</td>
            <td>2022</td>
            <td>შავი</td>
        </tr>
        <tr>
            <td>Mercedes AMG GT</td>
            <td>2021</td>
            <td>წითელი</td>
        </tr>
        <tr>
            <td>Audi RS7</td>
            <td>2020</td>
            <td>თეთრი</td>
        </tr>
        <tr>
            <td>Porsche 911</td>
            <td>2019</td>
            <td>ლურჯი</td>
        </tr>
        <tr>
            <td>Lamborghini Huracan</td>
            <td>2023</td>
            <td>ყვითელი</td>
        </tr>
    </table>

</body>

</html>
