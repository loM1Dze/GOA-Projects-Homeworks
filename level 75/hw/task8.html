<html>

<head>

    <title>საკვები პროდუქტები</title>

            margin: 5px;
            border-radius: 8px;
        }
    </style>

</head>

<body>

    <h1>პროდუქტების და ვიტამინები</h1>

    <ul class="main">
        <li>ვაშლი
            <ul class="vitamins">
                <li>ვიტამინი C</li>

            </ul>
        </li>

        <li>ბანანი
            <ul class="vitamins">

        </li>

        <li>სტაფილო
            <ul class="vitamins">

            </ul>
        </li>
    </ul>
