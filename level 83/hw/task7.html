<!-- 
FLEX-WRAP:

flex-wrap არის CSS-ის flexbox-ის კუთვნილება, რომელიც განსაზღვრავს
შვილობილ ელემენტებს ერთ ხაზზე დარჩებიან თუ გადავიდნენ ახალ ხაზზე.

ის გვეხმარება მაშინ, როცა ელემენტები ვერ ეტევა ერთ ხაზზე და გვინდა,
რომ ავტომატურად გადავიდნენ შემდეგ რიგში.

მნიშვნელობები:

1) nowrap (default)
- ელემენტები რჩებიან ერთ ხაზზე და არ გადადიან ახალ ხაზზე.
მაგალითი:
display: flex;
flex-wrap: nowrap;

2) wrap
- ელემენტები გადადიან ახალ ხაზზე თუ არ ეტევიან.
მაგალითი:
display: flex;
flex-wrap: wrap;

3) wrap-reverse
- იგივეა რაც wrap, მაგრამ ახალი რიგი ჩნდება ზემოთ მიმართულებით.
მაგალითი:
display: flex;
flex-wrap: wrap-reverse;
-->
