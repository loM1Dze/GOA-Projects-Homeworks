<!-- 4)ახსენით თუ რა კუთვნილებები ვისწავლეთ flex თან დაკავშირებით x ღერძზე ელემენტების განლაგების დროს,განმარტე თითოეული მათგანი -->
<!-- 
flex-start
ელემენტები იწყება კონტეინერის მარცხენა მხრიდან.
flex-end
ელემენტები გადადის მარჯვენა მხარეს.
center
ელემენტები დგება ცენტრში.
space-between
პირველი ელემენტი მარცხნივ, ბოლო მარჯვნივ, დანარჩენებს შორის თანაბარი სივრცე.
space-around
თითოეულ ელემენტს აქვს თანაბარი სივრცე გარშემო (საზღვრები ნახევრად თანაბარია კიდეებთან).
space-evenly
ყველა სივრცე სრულიად თანაბარია — კიდეებსა და ელემენტებს შორისაც. -->



<!-- 5)კომენტატის სახით ახსენით თუ რა არის gap  -->

<!-- 
gap არის Flexbox-ის (და Grid-ის) კუთვნილება,
რომელიც განსაზღვრავს სივრცეს ელემენტებს შორის.

ის ქმნის ერთგვარ “შუალედს” შვილ ელემენტებს შორის,
გარეშე margin-ების გამოყენების გარეშე.

მაგალითად:
gap: 10px;

ეს ნიშნავს, რომ ყველა ელემენტს შორის იქნება 10px დაშორება. -->




<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        .container {
        width: 500px;
        display: flex;
        justify-content: flex-end;
        }

        .box {
        width: 50px;
        height: 50px;
        background: blue;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
</body>

</html>
