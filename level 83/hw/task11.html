<!-- 16)შექმენი 6 ბლოკი ერთ კონტეინერში, მაგრამ:

კონტეინერს მიეცი პატარა სიგანე მაგ 300px

გამოიყენე ისეთი მნიშვნელობა flex-wrap-ზე, რომ ელემენტები არ გადავიდნენ ახალ ხაზზე ანუ არ შეიფუთნონ მშობელ ელემენტი -->


<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Flex No Shrink</title>

    <style>
        .container {
            width: 300px;
            display: flex;
            flex-wrap: nowrap;
            gap: 5px;
            background: black;
            padding: 10px;
        }

        .box {
            width: 80px;
            height: 60px;
            background: steelblue;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>

</head>

<body>

    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
    </div>

</body>

</html>
