<html lang="en">

<head>
    <meta charset="UTF-8">
    <style>
        .parent {
            width: 500px;
            height: 500px;
            border: 2px solid red;
            display: flex;
            margin-bottom: 20px;
        }

        .child {
            width: 100px;
            height: 100px;
            background-color: blue;
        }

        .parent1 {
            justify-content: space-evenly;

        }

        .parent2 {
            justify-content: space-between;

        }

        .parent3 {
            justify-content: space-around;
            align-items: flex-start;
        }

</head>

<body>

    <div class="parent parent1">
        <div class="child"></div>
        <div class="child"></div>
        <div class="child"></div>
    </div>

    <div class="parent parent2">
        <div class="child"></div>
        <div class="child"></div>

    </div>

    <div class="parent parent3">
        <div class="child"></div>
