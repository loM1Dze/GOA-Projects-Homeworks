<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .contact-form {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 300px;
        }

        .contact-form h2 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: normal;
        }

        .contact-form input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
        }

        .contact-form button {
            width: 30%;
            padding: 10px;
            background: #ff00fb;
            color: #fff;
            border-radius: 5px;
            cursor: pointer;
            border-style: none;
            margin-left: 100;
        }

        .contact-form button:hover {
            background: #555;
        }
    </style>
</head>

<body>
    <form class="contact-form">
        <input type="text" name="name" placeholder="Username" required>
        <input type="password" name="pass" placeholder="Password" required>
        <button type="submit">Log in</button>
    </form>
</body>

</html>
