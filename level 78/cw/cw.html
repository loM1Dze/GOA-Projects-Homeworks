<!-- 1)შექმენი სარეგისტრაციო ფორმა

სადაც მომ ხმარებელი შეიუვანს სახელს ემაილს და მის პაროლს

გამოიყენეთ placeholder ,label არ არის საჭირო

თითიეული input ის სტილები  მოაშორეთ outline , უკანა ფონის ფერი იყოს მწვანე , border ქონდეს წითელი , ტექსტის ფერი ქონდეს ლურჯი , მოუმრგვალეთ კუთხეები 10px ით, შეუცვალეთ კალიგრაფია, გახადეთ მუქი 

input თეგებს რომ დააკლიკბთ მიიღონ მათ შემდეგი სტილები  ფონის ფერი გახდეს შავიო , ტექსტის ფერი თეთრი , ბორდერი საერთოდ მოშორდეს , მოუმსრგვალდეს კუთხეები 10 px ით ,და გახდეს მუქის ნაცვლად თხელი ტექსტი -->


<html>

<head>
    <meta charset="UTF-8">
    <title>რეგისტრაცია</title>

    <style>
        body {
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
        }

        form {
            width: 300px;
            margin: 100px auto;
        }

        input {
            display: block;
            width: 100%;
            margin: 10px;
            padding: 10px;
            outline: none;
            background-color: green;
            border: 2px solid red;
            color: blue;
            border-radius: 10px;
            font-family: "Courier New", cursive;
            font-weight: bold;
        }


        input:focus {
            background-color: black;
            color: rgb(255, 255, 255);
            border: none;
        }
    </style>

</head>

<body>

    <form>
        <input type="text" placeholder="სახელი">
        <input type="email" placeholder="ემაილი">
        <input type="password" placeholder="პაროლი">
    </form>

</body>

</html>
