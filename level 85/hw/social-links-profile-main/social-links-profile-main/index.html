<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Social links profile</title>

  <style>
    * {
      margin: 0;
      box-sizing: border-box;
      font-family: sans-serif;
    }

    body {
      background: hsl(0, 0%, 8%);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      width: 100%;
      max-width: 350px;
      background: hsl(0, 0%, 12%);
      padding: 30px;
      border-radius: 15px;
      text-align: center;
    }

    .card img {
      width: 80px;
      border-radius: 50%;
      margin-bottom: 20px;
    }

    h1 {
      color: hsl(0, 0%, 100%);
      font-size: 24px;
      margin-bottom: 8px;
    }

    .location {
      color: hsl(75, 94%, 57%);
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 25px;
    }

    .bio {
      color: hsl(0, 0%, 100%);
      font-size: 14px;
      margin-bottom: 25px;
    }

    .links a {
      display: block;
      text-decoration: none;
      background: hsl(0, 0%, 20%);
      color: hsl(0, 0%, 100%);
      padding: 14px;
      margin-bottom: 15px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      transition: 0.3s;
    }

    .links a:hover {
      background: hsl(75, 94%, 57%);
      color: hsl(0, 0%, 8%);
    }

    .links a:last-child {
      margin-bottom: 0;
    }
  </style>
</head>

<body>

  <div class="card">
    <img src="./assets/images/avatar-jessica.jpeg" alt="Jessica Randall">

    <h1>Jessica Randall</h1>

    <p class="location">London, United Kingdom</p>

    <p class="bio">"Front-end developer and avid reader."</p>

    <div class="links">
      <a href="#">GitHub</a>
      <a href="#">Frontend Mentor</a>
      <a href="#">LinkedIn</a>
      <a href="#">Twitter</a>
      <a href="#">Instagram</a>
    </div>
  </div>

</body>

</html>
