<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>
        .container {
            display: flex;
            background: #12c7c7;
            gap: 10px;
            padding: 10px;
        }

        .box {
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 50px;
            flex-shrink: 0;
        }

        .box1,
        .box2,
        .box4 {
            flex-basis: 50px;
        }

        .box3 {
            flex: 1;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="box box1">1</div>
        <div class="box box2">2</div>
        <div class="box box3">3</div>
        <div class="box box4">4</div>
    </div>

</body>

</html>
