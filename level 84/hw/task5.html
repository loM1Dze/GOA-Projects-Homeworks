<!-- 6)გაქვს 4 ელემენტი ერთ რიგში.

მოაწყე ისე, რომ:

პირველი იყოს 100px
მეორე — 200px
მესამე — 300px
მეოთხე — 150px

გამოიყენე flex-basis თითოეულზე -->

<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>
        .container {
            display: flex;
            border: 2px solid black;
        }

        .box1 {
            flex-basis: 100px;
            height: 100px;
            background: red;
            margin: 5px;
        }

        .box2 {
            flex-basis: 200px;
            height: 100px;
            background: green;
            margin: 5px;
        }

        .box3 {
            flex-basis: 300px;
            height: 100px;
            background: blue;
            margin: 5px;
        }

        .box4 {
            flex-basis: 150px;
            height: 100px;
            background: orange;
            margin: 5px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="box1">1</div>
        <div class="box2">2</div>
        <div class="box3">3</div>
        <div class="box4">4</div>
    </div>

</body>

</html>
