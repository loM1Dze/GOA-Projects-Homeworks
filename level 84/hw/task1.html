<!-- 1)კომენტარის სახით ახსენით თუ რა არის flex-grow და რას აკეთებს ის,ასევევე რა მნშვნელობები გადაეცემა მას -->
<!-- 
flex-grow განსაზღვრავს ელემენტის "გაზრდის კოეფიციენტს".
როცა კონტეინერში არის თავისუფალი სივრცე, ელემენტები იზრდებიან ამ მნიშვნელობის მიხედვით.

მნიშვნელობები:
0  -> ელემენტი არ გაიზრდება (default მნიშვნელობა)
1  -> ელემენტი გაიზრდება 
2, 3, ... -> ელემენტი უფრო გაიზრდება სხვებთან შედარებით

მაგალითი:
თუ ერთ ელემენტს აქვს flex-grow: 1 და მეორეს flex-grow: 2,
მეორე ელემენტი მიიღებს ორჯერ მეტ თავისუფალ სივრცეს. -->


<!-- 2)გაქვს flex container და შიგნით 3 ელემენტი.

ყველა ელემენტს აქვს საწყისი width (მაგ: 100px)
გააკეთე ისე, რომ მეორე ელემენტმა დაიკავოს დანარჩენი თავისუფალი სივრცე

გამოიყენე flex-grow -->

<html>

<head>
    <title>Flex Grow Task</title>
    <style>
        .container {
            display: flex;
        }

        .item {
            width: 100px;
            background: lightgray;
            margin: 5px;
            padding: 20px;
            text-align: center;
        }

        .item:nth-child(2) {
            flex-grow: 1;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
    </div>

</body>

</html>
