<!-- 7) შექმენით ლინკი, სადაც გამოიყენებთ :link ფსევდო-სელექტორს, ფერს გაუხდით ყვითელს, და font-family: Verdana, ხოლო :active-ზე ლინკს გაეწეროს ზღვარი: 3px solid წითელი და უკანა ფონის ფერი ვარდისფერი. -->


<html lang="ka">

<head>
    <meta charset="UTF-8">
    <title>Link და Active სტილი</title>
    <style>
        a:link {
            color: yellow;
            font-family: Verdana;
        }

        a:active {
            border: 3px solid red;
            background-color: pink;
        }
    </style>
</head>

<body>

    <a href="#">opsec</a>

</body>

</html>
