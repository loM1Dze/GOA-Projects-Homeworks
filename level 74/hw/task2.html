<!-- 2) შექმენით ლინკი და გამოიყენეთ :hover ფსევდო-სელექტორი, რომ მაუსის მიტანისას ტექსტი გახდეს bold და ფერი შეიცვალოს და გახდეს წითელი. -->

<html>

<head>
    <meta charset="UTF-8">
    <title>Hover ეფექტი</title>
    <style>
        a {
            text-decoration: none;
        }

        a:hover {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <a href="#">opsec</a>

</body>

</html>
