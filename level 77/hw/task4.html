<!-- 4) შექმენით დაულაგებელი სია, სადაც ერთ ხაზში გამოიყენებთ შემოკლებულ shorthand კუთვნილებას და ერთდროულად მიუთითებთ ნიშნულის ტიპს, მდებარეობას და  სურათსაც, შემდეგ კი სიას და თითოეულ li ელემენტს გაუწერეთ საზღვარი, უკანა ფონის ფერი, font-family, და დაამატეთ hover ეფექტი, რომ მაუსის გადატარებისას შეიცვალოს უკანა ფონის ფერი და ტექსტის ფერი. -->

<html>

<head>
    <meta charset="UTF-8">
    <title>List</title>

    <style>
        ul {
            list-style: square inside url("https://cdn-icons-png.flaticon.com/16/1828/1828884.png");

            font-family: Arial, sans-serif;
            background-color: #1e272e;
            border: 3px solid #00a8ff;
            padding: 20px;
            width: 300px;
        }


        li {
            background-color: #485460;
            color: white;
            border: 2px solid #00a8ff;
            padding: 10px;
            margin: 8px;
            transition: 0.3s;
        }


        li:hover {
            background-color: #00a8ff;
            color: black;
        }
    </style>
</head>

<body>

    <h2>დაულაგებელი სია (Custom Style)</h2>

    <ul>
        <li>გეიმინგი</li>
        <li>დრიფტი</li>
        <li>მანქანები</li>
        <li>მუსიკა</li>
    </ul>

</body>

</html>
