<html>

<head>
    <style>
        table {
            border-collapse: collapse;
        }

        th {
            background: green;
            color: black;
            border: 2px solid #333;
            padding: 8px;
        }

        td {
            border: 2px solid #333;
            padding: 8px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #e6e6e6;
        }

        tr:nth-child(odd) {
            background: #2aa3b0;
        }
    </style>
</head>

<body>

    <table>
        <tr>
            <th>EmpId</th>

        </tr>
        <tr>

</body>

</html>
