<!-- 3) შექმენით ერთი დაულაგებელი და ერთი დალაგებული სია, სადაც ორივე სიას განსხვავებული ნიშნულები/ნუმერაცია ექნება, და ორივე სია გასტილეთ სისქის, ზომის, ფერის, უკანა ფონის ფერის, საზღვრის, კალიგრაფიის კუთვნილებებით. -->

<html>

<head>
    <meta charset="UTF-8">
    <title>სიის მაგალითი</title>

    <style>
        ul {
            list-style-type: square;
            font-family: monospace;
            font-size: 18px;
            color: white;
            background-color: #2c3e50;
            border: 3px solid #3498db;
            padding: 40px;
            width: 300px;
            margin: auto auto;
        }

        ol {
            list-style-type: upper-roman;
            font-family: serif;
            font-size: 20px;
            color: black;
            background-color: #f1c40f;
            border: 4px dashed #e74c3c;
            padding: 40px;
            width: 300px;
            margin: auto auto;
        }

        li {
            margin: 12px 0;
        }

        h2 {
            margin-left: 590;
        }
    </style>
</head>

<body>

    <h2>დაულაგებელი სია (ჰობები)</h2>
    <ul>
        <li>თამაშები</li>
        <li>მანქანები</li>
        <li>მუსიკა</li>
        <li>დრიფტი</li>
    </ul>

    <h2>დალაგებული სია (დღის გეგმა)</h2>
    <ol>
        <li>გაღვიძება</li>
        <li>სწავლა</li>
        <li>თამაში</li>
        <li>დასვენება</li>
    </ol>

</body>

</html>
