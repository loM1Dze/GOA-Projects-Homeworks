<!-- 10) შექმენით დალაგებული სია მოგზაურობის გეგმებისთვის, სადაც თითოეული ქვეყნის ქვეშ იქნება დაულაგებელი სია ქალაქებზე, და გამოიყენეთ list-style შემოკლებული shorthand კუთვნილება ორივე სიაზე ისე, რომ მთავარ სიას ჰქონდეს georgian inside და ქვე-სიას ჰქონდეს circle outside, ასევე დაამატეთ ტექსტის ზომა, text-decoration, ტექსტის ფერი, უკანა ფონის ფერი და გააკეთეთ hover ეფექტი ისე, რომ მაუსის გადატარებისას შეიცვალოს ყველა li თეგის უკანა ფონის ფერი და ტექსტის ფერი. -->

<html>

<head>
    <meta charset="UTF-8">
    <title>მოგზაურობის გეგმები</title>

    <style>
        ol {
            list-style: georgian inside;
            font-size: 20px;
            text-decoration: underline;
            color: #ffffff;
            background-color: #2c3e50;
            width: 400px;
            margin: 40px auto;
            padding: 20px;
            border-radius: 10px;
        }

        ul {
            list-style: circle outside;
            font-size: 16px;
            text-decoration: none;
            color: #000000;
            background-color: #ecf0f1;
            margin: 10px 0;
            padding: 10px 30px;
            border-radius: 8px;
        }

        li {
            margin: 10px 0;
            padding: 5px;
            transition: 0.3s;
        }

        li:hover {
            background-color: #e74c3c;
            color: #ffffff;
        }
    </style>

</head>

<body>

    <ol>
        <li>საქართველო
            <ul>
                <li>თბილისი</li>
                <li>ბათუმი</li>
                <li>ყაზბეგი</li>
            </ul>
        </li>

        <li>იტალია
            <ul>
                <li>რომი</li>
                <li>მილანი</li>
                <li>ვენეცია</li>
            </ul>
        </li>

        <li>საფრანგეთი
            <ul>
                <li>პარიზი</li>
                <li>ლიონი</li>
                <li>მარსელი</li>
            </ul>
        </li>
    </ol>

</body>

</html>
