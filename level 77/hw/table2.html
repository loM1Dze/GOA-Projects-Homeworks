<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colored Table</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        table {
            width: 80%;
            border-collapse: collapse;
            margin: 20px auto;
            text-align: center;
        }

        th {
            background-color: #333;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            color: white;
        }

        tr:nth-child(1) {
            background-color: #4A90E2;
        }

        tr:nth-child(2) {
            background-color: #00ac34;
        }

        tr:nth-child(3) {
            background-color: #eaff00;
        }

        tr:nth-child(4) {
            background-color: #D0021B;
        }

        tr:nth-child(5) {
            background-color: #01adba;
        }
    </style>
</head>

<body>

    <table>
        <tr>
            <th>INVOICE</th>
            <th>CUSTOMER</th>
            <th>SHIP</th>
            <th>PRICE</th>
            <th>PURCHASED PRICE</th>
        </tr>

</html>
