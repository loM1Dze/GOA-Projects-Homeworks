<html>
<head>
<meta charset="UTF-8">
<title>სასკოლო საგნები</title>

<style>

ol {
    list-style-type: upper-roman; 
    font-size: 20px;
    color: #ffffff;
    background-color: #34495e;
    border: 3px solid #2c3e50;
    width: 350px;
    margin: 50px auto; 
    padding: 50px;
    text-align: center;
}

ul {
    list-style-type: square;
    font-size: 16px;
    color: #000000;
    background-color: #ecf0f1;
    border: 2px dashed #7f8c8d;
    margin: 10px auto;
    padding: 30px;
    width: 80%;
    text-align: left;
}

li {
    margin: 10px 0;
}
</style>

</head>

<body>

<ol>
    <li>მათემატიკა
        <ul>
            <li>ალგებრა</li>
            <li>გეომეტრია</li>
            <li>ტრიგონომეტრია</li>
        </ul>
    </li>

    <li>ქართული ენა
        <ul>
            <li>გრამატიკა</li>
            <li>ლიტერატურა</li>
            <li>ორთოგრაფია</li>
        </ul>
    </li>

    <li>ისტორია
        <ul>
            <li>ძველი ისტორია</li>
            <li>შუა საუკუნეები</li>
            <li>თანამედროვე ისტორია</li>
        </ul>
    </li>

    <li>ინგლისური
        <ul>
            <li>გრამატიკა</li>
            <li>ლექსიკონი</li>
            <li>სასაუბრო</li>
        </ul>
    </li>
</ol>

</body>
</html>
