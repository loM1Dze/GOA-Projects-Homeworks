<!-- 8) შექმენით დალაგებული სია ქალაქების შესახებ, სადაც თითოეული ელემენტის ნუმერაცია იქნება სურათი და თითოეულ li ელემენტს გაუწერეთ საზღვარი, ტექსტის ფერი, უკანა ფონის ფერი, text-decoration და გაცენტრეთ, ხოლო მაუსის გადატარებისას შეიცვალოს მათი სტილები. -->


<html>

<head>
    <meta charset="UTF-8">
    <title>ქალაქები</title>

    <style>
        ol {
            list-style-image: url("https://cdn-icons-png.flaticon.com/16/684/684908.png");
            width: 300px;
            margin: 50px auto;
            padding: 20px;
        }

        li {
            border: 2px solid #2c3e50;
            color: #ffffff;
            background-color: #3498db;
            text-decoration: line-through;
            text-align: center;
            margin: 10px 0;
            padding: 10px;
            transition: 0.3s;
        }


        li:hover {
            background-color: #2c3e50;
            color: #f1c40f;
            border-color: #f1c40f;
            text-decoration: none;
            transform: scale(1.05);
        }
    </style>

</head>

<body>

    <ol>
        <li>თბილისი</li>
        <li>ბათუმი</li>
        <li>ქუთაისი</li>
        <li>რუსთავი</li>
        <li>ზუგდიდი</li>
    </ol>

</body>

</html>
